<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>Industrial Quiz</title>

<!-- iOS PWA / Home Screen support -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Quiz" />
<meta name="theme-color" content="#000000" />
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%231a2332'/><circle cx='90' cy='86' r='44' fill='none' stroke='%23ffffff' stroke-width='10'/><path d='M118 116 L138 136' stroke='%23ffffff' stroke-width='12' stroke-linecap='round'/><text x='90' y='100' font-family='Inter, system-ui, sans-serif' font-size='44' font-weight='800' text-anchor='middle' fill='%23ffffff'>?</text></svg>" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #000000;
    --on-bg: #ffffff;
    --on-bg-soft: rgba(255,255,255,0.72);
    --on-bg-mute: rgba(255,255,255,0.5);
    --surface: #ffffff;
    --surface-2: #fafbfc;
    --border: #e3e5ea;
    --border-strong: #c9ccd4;
    --text: #1a1d24;
    --text-soft: #555a66;
    --text-mute: #8a8f99;
    --accent: #1a2332;
    --accent-soft: #eef1f7;
    --gold: #c9a84c;
    --green: #2e8b57;
    --green-soft: #e6f4ea;
    --green-border: #c8e6d3;
    --red: #b03030;
    --red-soft: #fbeaea;
    --red-border: #f0c8c8;
    --shadow: 0 6px 24px rgba(20, 25, 40, 0.06), 0 1px 3px rgba(20, 25, 40, 0.04);
    --shadow-lift: 0 18px 48px rgba(20, 25, 40, 0.12), 0 2px 6px rgba(20, 25, 40, 0.06);
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  html { height: 100%; }
  body {
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
    -webkit-text-size-adjust: 100%;
    overscroll-behavior-y: contain;
  }
  .container {
    max-width: 880px;
    margin: 0 auto;
    padding: 32px 24px 80px;
    padding-top: max(32px, env(safe-area-inset-top));
    padding-bottom: max(80px, calc(env(safe-area-inset-bottom) + 24px));
    padding-left: max(20px, env(safe-area-inset-left));
    padding-right: max(20px, env(safe-area-inset-right));
  }
  header.top {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .title-block h1 {
    font-size: 26px;
    font-weight: 800;
    margin: 0 0 4px;
    letter-spacing: -0.02em;
    color: var(--on-bg);
  }
  .title-block p {
    margin: 0;
    color: var(--on-bg-soft);
    font-size: 13px;
  }
  .stats {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .stat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 7px 12px;
    font-size: 12.5px;
    color: var(--text-soft);
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .stat-pill b { color: var(--text); font-weight: 700; }
  .stat-pill.correct { background: var(--green-soft); border-color: var(--green-border); color: #1e6b40; }
  .stat-pill.correct b { color: #134b2c; }
  .stat-pill.wrong { background: var(--red-soft); border-color: var(--red-border); color: #872626; }
  .stat-pill.wrong b { color: #5e1a1a; }
  .stat-pill.streak { background: #fff7e6; border-color: #f3e0b4; color: #8a6a18; }
  .stat-pill.streak b { color: #5b4708; }

  .toolbar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .toolbar-row {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .toolbar-row + .toolbar-row { margin-top: 10px; }
  .toolbar-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-mute);
    margin-right: 6px;
  }
  button.btn {
    appearance: none;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    min-height: 38px;
    transition: background 120ms ease, transform 60ms ease;
  }
  button.btn:hover { background: var(--surface-2); }
  button.btn:active { transform: scale(0.98); }
  button.btn.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  button.btn.primary:hover { background: #2a3346; }
  button.btn.ghost {
    border-color: var(--border);
    color: var(--text-soft);
    font-weight: 500;
  }
  .topic-chips {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    width: 100%;
  }
  .chip {
    appearance: none;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-soft);
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 11px;
    border-radius: 999px;
    cursor: pointer;
    min-height: 32px;
    transition: all 120ms ease;
  }
  .chip:hover { border-color: var(--border-strong); color: var(--text); }
  .chip.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .chip .count {
    opacity: 0.65;
    font-weight: 500;
    margin-left: 4px;
  }

  .toolbar-control {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1 1 220px;
    min-width: 0;
  }
  .select {
    appearance: none;
    -webkit-appearance: none;
    background-color: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 36px 10px 14px;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    color: var(--text);
    cursor: pointer;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12'><path d='M3 4.5l3 3 3-3' stroke='%23555a66' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    background-repeat: no-repeat;
    background-position: right 12px center;
    background-size: 12px;
    width: 100%;
    transition: border-color 0.15s ease;
  }
  .select:hover { border-color: var(--border-strong); }
  .select:focus { outline: none; border-color: var(--accent); }

  .segmented {
    display: inline-flex;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 3px;
    gap: 2px;
    width: 100%;
  }
  .seg-btn {
    background: transparent;
    border: none;
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 12.5px;
    font-weight: 500;
    font-family: inherit;
    color: var(--text-soft);
    cursor: pointer;
    transition: all 0.15s ease;
    flex: 1;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    min-height: 32px;
  }
  .seg-btn:hover { color: var(--text); }
  .seg-btn.active {
    background: var(--accent);
    color: #fff;
    font-weight: 600;
  }
  .seg-btn .seg-count {
    opacity: 0.75;
    font-weight: 500;
    font-size: 11px;
  }
  .seg-btn.active .seg-count { opacity: 0.9; }

  .mark-row {
    margin-top: 14px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .mark-btn {
    appearance: none;
    flex: 1 1 160px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    padding: 11px 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    min-height: 44px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 120ms ease;
  }
  .mark-btn:hover { border-color: var(--border-strong); }
  .mark-btn.got { color: #1e6b40; }
  .mark-btn.got:hover, .mark-btn.got.is-set {
    background: var(--green-soft);
    border-color: var(--green);
    color: #134b2c;
  }
  .mark-btn.review { color: #8a6a18; }
  .mark-btn.review:hover, .mark-btn.review.is-set {
    background: #fff7e6;
    border-color: #c9a84c;
    color: #5b4708;
  }
  .mark-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 3px 9px;
    border-radius: 999px;
  }
  .mark-pill.got {
    background: var(--green-soft);
    color: #134b2c;
    border: 1px solid var(--green-border);
  }
  .mark-pill.review {
    background: #fff7e6;
    color: #5b4708;
    border: 1px solid #f3e0b4;
  }

  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .progress-bar > div {
    height: 100%;
    background: linear-gradient(90deg, var(--accent) 0%, #2a3346 100%);
    transition: width 240ms ease;
  }

  .quiz-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    box-shadow: var(--shadow);
    min-height: 360px;
  }
  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .term-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-soft);
    color: var(--accent);
    border-radius: 999px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.01em;
  }
  .topic-tag {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-mute);
    font-weight: 700;
  }
  .question {
    font-size: 20px;
    line-height: 1.45;
    font-weight: 600;
    margin: 8px 0 22px;
    color: var(--text);
    letter-spacing: -0.005em;
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .option {
    appearance: none;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    padding: 14px 16px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    text-align: left;
    line-height: 1.4;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    min-height: 48px;
    transition: background 120ms ease, border-color 120ms ease, transform 60ms ease;
  }
  .option:hover:not(:disabled) {
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .option:active:not(:disabled) { transform: scale(0.995); }
  .option:disabled { cursor: default; }
  .option .letter {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border-radius: 6px;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .option.is-correct {
    border-color: var(--green);
    background: var(--green-soft);
  }
  .option.is-correct .letter {
    background: var(--green);
    color: #fff;
  }
  .option.is-wrong {
    border-color: var(--red);
    background: var(--red-soft);
  }
  .option.is-wrong .letter {
    background: var(--red);
    color: #fff;
  }
  .option.dim { opacity: 0.55; }

  .feedback {
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface-2);
    display: none;
  }
  .feedback.show { display: block; }
  .feedback .verdict {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .feedback.right .verdict { color: var(--green); }
  .feedback.wrong .verdict { color: var(--red); }
  .feedback .excerpt-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-mute);
    margin-bottom: 4px;
  }
  .feedback .excerpt {
    font-size: 14px;
    line-height: 1.55;
    color: var(--text-soft);
    font-style: italic;
  }
  .feedback .term-link {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    margin-top: 8px;
    display: block;
  }

  .actions {
    margin-top: 18px;
    display: flex;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }
  .shortcuts {
    margin-top: 22px;
    font-size: 11px;
    color: var(--on-bg-mute);
    text-align: center;
    letter-spacing: 0.02em;
  }
  .shortcuts kbd {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-bottom-width: 2px;
    border-radius: 4px;
    padding: 1px 6px;
    font-family: inherit;
    font-size: 10.5px;
    color: var(--on-bg-soft);
    font-weight: 600;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-soft);
  }
  .empty-state h2 {
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 8px;
    color: var(--text);
  }
  .empty-state p { margin: 4px 0; font-size: 14px; }
  .empty-state .big-score {
    font-size: 64px;
    font-weight: 800;
    color: var(--accent);
    margin: 14px 0 8px;
    letter-spacing: -0.03em;
  }
  .empty-state .pct {
    font-size: 16px;
    color: var(--text-mute);
    font-weight: 600;
  }

  @media (max-width: 640px) {
    .container { padding: 18px 14px 60px; }
    .title-block h1 { font-size: 22px; }
    .quiz-card { padding: 20px 18px; min-height: 340px; }
    .question { font-size: 18px; }
    .option { font-size: 14.5px; padding: 13px 14px; }
    .stats { gap: 6px; }
    .stat-pill { font-size: 11.5px; padding: 6px 10px; }
    .shortcuts { display: none; }
  }

  /* Swipe area for mobile next */
  @media (hover: none) {
    .option:hover:not(:disabled) {
      border-color: var(--border);
      background: var(--surface);
    }
  }
</style>
</head>
<body>
<div class="container">
  <header class="top">
    <div class="title-block">
      <h1>Industrial Quiz</h1>
      <p>Specific-detail multiple choice on the IOS vocabulary deck</p>
    </div>
    <div class="stats">
      <span class="stat-pill correct">Right <b id="stat-right">0</b></span>
      <span class="stat-pill wrong">Wrong <b id="stat-wrong">0</b></span>
      <span class="stat-pill streak">Streak <b id="stat-streak">0</b></span>
      <span class="stat-pill">Q <b id="stat-q">0</b>/<b id="stat-total">0</b></span>
    </div>
  </header>

  <div class="toolbar">
    <div class="toolbar-row">
      <div class="toolbar-control" style="flex: 2 1 280px">
        <span class="toolbar-label">Topic</span>
        <select id="topic-select" class="select" aria-label="Filter by topic"></select>
      </div>
      <div class="toolbar-control" style="flex: 3 1 360px">
        <span class="toolbar-label">Show</span>
        <div class="segmented" id="status-filter" role="group" aria-label="Filter by mark">
          <button class="seg-btn active" data-mode="all">All <span class="seg-count" id="count-all">0</span></button>
          <button class="seg-btn" data-mode="unmarked">Unmarked <span class="seg-count" id="count-unmarked">0</span></button>
          <button class="seg-btn" data-mode="review">Review <span class="seg-count" id="count-review">0</span></button>
          <button class="seg-btn" data-mode="got">Got It <span class="seg-count" id="count-got">0</span></button>
        </div>
      </div>
    </div>
    <div class="toolbar-row">
      <button class="btn ghost" id="btn-shuffle">Shuffle</button>
      <button class="btn ghost" id="btn-clear-marks">Clear marks (topic)</button>
      <button class="btn primary" id="btn-restart">Restart session</button>
    </div>
  </div>

  <div class="progress-bar"><div id="progress-fill" style="width:0%"></div></div>

  <main id="main"></main>

  <p class="shortcuts">
    <kbd>1</kbd>–<kbd>4</kbd> answer &nbsp;·&nbsp; <kbd>Space</kbd> / <kbd>Enter</kbd> next &nbsp;·&nbsp; <kbd>G</kbd> got it &nbsp;·&nbsp; <kbd>V</kbd> needs review &nbsp;·&nbsp; <kbd>S</kbd> shuffle &nbsp;·&nbsp; <kbd>R</kbd> restart
  </p>
</div>

<script>
/* ------------------------------------------------------------------
   QUESTION BANK
   Every answer string is drawn directly from the vocab-list.md deck
   so the source-of-truth excerpt is shown after each answer.
   ------------------------------------------------------------------ */
const QUESTIONS = [
  // ============ Building Shell ============
  { topic:"Building Shell", term:"Slab",
    q:"What is the typical thickness of a warehouse slab?",
    correct:"6\"–8\" thick",
    distractors:["3\"–4\" thick","10\"–12\" thick","4\"–5\" thick"],
    excerpt:"Typically 6\"–8\" thick, reinforced with rebar or fiber mesh, poured directly on a compacted gravel base." },
  { topic:"Building Shell", term:"Slab",
    q:"What is the ideal modern Class A slab spec?",
    correct:"7\"–8\" at 5,000 PSI with FF50/FL35 finish",
    distractors:["6\"–7\" at 4,000 PSI","5\"–6\" at 3,000 PSI","8\"–10\" at 6,000 PSI with FF75/FL50"],
    excerpt:"Ideal modern Class A: 7\"–8\" at 5,000 PSI with FF50/FL35 finish for forklift and AS/RS operations." },

  { topic:"Building Shell", term:"Slab-on-grade buildings",
    q:"Where is slab-over-structural-floor (the alternative to slab-on-grade) most commonly found?",
    correct:"Dense urban multi-story logistics (NYC, Brooklyn, parts of LA)",
    distractors:["Suburban distribution parks in the Sun Belt","Cold storage facilities","Class A bulk distribution centers"],
    excerpt:"The alternative — slab over a structural floor system — exists mostly in dense urban multi-story logistics (NYC, Brooklyn, parts of LA) and remains rare and very expensive." },

  { topic:"Building Shell", term:"FF/FL ratings",
    q:"What FF/FL rating is required for AS/RS or very-narrow-aisle racking?",
    correct:"FF60+/FL40+",
    distractors:["FF50/FL35","FF20–30/FL15–20","FF100+/FL75+"],
    excerpt:"Required for AS/RS or very-narrow-aisle racking: FF60+/FL40+, sometimes FF100+ for the actual rack aisles." },
  { topic:"Building Shell", term:"FF/FL ratings",
    q:"What does surface grinding fix on a bad slab?",
    correct:"It can improve FF but does little for FL",
    distractors:["It improves both FF and FL equally","It improves FL but not FF","It improves neither — only re-pouring works"],
    excerpt:"Slab flatness is fixable only to a limited extent — surface grinding can improve FF but does little for FL, so a bad slab is essentially a permanent constraint on tenant use." },

  { topic:"Building Shell", term:"Minimum clear height for high-racking",
    q:"What clear-height range supports 6-high pallet racking in standard modern logistics?",
    correct:"32'–36'",
    distractors:["24'–28'","28'–32'","36'–40'"],
    excerpt:"32'–36' = standard modern logistics, supports 6-high." },
  { topic:"Building Shell", term:"Minimum clear height for high-racking",
    q:"Below what clear height do modern logistics tenants typically start passing?",
    correct:"32' clear",
    distractors:["24' clear","28' clear","36' clear"],
    excerpt:"Practical floor: 32' clear is the threshold below which modern logistics tenants start passing." },

  { topic:"Building Shell", term:"ESFR sprinklers",
    q:"Above what storage height are ESFR sprinklers required per NFPA 13?",
    correct:"~25' clear",
    distractors:["~15' clear","~32' clear","~40' clear"],
    excerpt:"Required: for racked storage above ~25' clear, per NFPA 13." },
  { topic:"Building Shell", term:"ESFR sprinklers",
    q:"What does an ESFR retrofit typically cost?",
    correct:"$3–6/SF",
    distractors:["$1–2/SF","$8–12/SF","$15–20/SF"],
    excerpt:"Retrofit ESFR is doable but costs $3–6/SF depending on the configuration." },

  { topic:"Building Shell", term:"Column grid",
    q:"What column grid is typical for modern Class A logistics?",
    correct:"50' × 50' or 50' × 54'",
    distractors:["40' × 40'","30' × 30'","60' × 70'"],
    excerpt:"Typical: 50' × 50' or 50' × 54' for modern Class A logistics." },
  { topic:"Building Shell", term:"Column grid",

/* ------------------------------------------------------------------
   STATE & PERSISTENCE
   ------------------------------------------------------------------ */
const STORAGE_KEY = 'industrial-quiz-v2';
const LEGACY_KEY = 'industrial-quiz-v1';
const TOPICS = [...new Set(QUESTIONS.map(q => q.topic))]; // preserves deck order

const state = {
  selectedTopic: 'all',         // 'all' or a topic name
  statusMode: 'all',            // 'all' | 'unmarked' | 'review' | 'got'
  order: [],                    // shuffled indexes into QUESTIONS
  cursor: 0,
  right: 0,
  wrong: 0,
  streak: 0,
  bestStreak: 0,
  answered: {},                 // qIdx -> {choice, correct}
  statusMap: {},                // qIdx -> 'got' | 'review'
  answeredCurrent: false
};

function loadPersisted() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      if (saved.statusMap && typeof saved.statusMap === 'object') {
        for (const k of Object.keys(saved.statusMap)) {
          const i = parseInt(k, 10);
          if (i >= 0 && i < QUESTIONS.length && (saved.statusMap[k] === 'got' || saved.statusMap[k] === 'review')) {
            state.statusMap[i] = saved.statusMap[k];
          }
        }
      }
      if (typeof saved.bestStreak === 'number') state.bestStreak = saved.bestStreak;
      if (typeof saved.selectedTopic === 'string') state.selectedTopic = saved.selectedTopic;
      if (typeof saved.statusMode === 'string') state.statusMode = saved.statusMode;
      return;
    }
    // One-time migration from v1 missedSet → statusMap['review']
    const legacy = localStorage.getItem(LEGACY_KEY);
    if (legacy) {
      const saved = JSON.parse(legacy);
      if (Array.isArray(saved.missed)) {
        saved.missed.forEach(i => { if (i < QUESTIONS.length) state.statusMap[i] = 'review'; });
      }
      if (typeof saved.bestStreak === 'number') state.bestStreak = saved.bestStreak;
    }
  } catch (e) { /* ignore */ }
}
function persist() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      statusMap: state.statusMap,
      bestStreak: state.bestStreak,
      selectedTopic: state.selectedTopic,
      statusMode: state.statusMode
    }));
  } catch (e) { /* ignore */ }
}

/* ------------------------------------------------------------------
   DECK BUILDING
   ------------------------------------------------------------------ */
function matchesTopic(q) {
  return state.selectedTopic === 'all' || q.topic === state.selectedTopic;
}
function matchesStatus(i) {
  const s = state.statusMap[i];
  switch (state.statusMode) {
    case 'unmarked': return !s;
    case 'review':   return s === 'review';
    case 'got':      return s === 'got';
    default:         return true;
  }
}
function buildDeck() {
  let pool = QUESTIONS
    .map((q, i) => i)
    .filter(i => matchesTopic(QUESTIONS[i]) && matchesStatus(i));
  // Fisher–Yates shuffle
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  state.order = pool;
  state.cursor = 0;
  state.right = 0;
  state.wrong = 0;
  state.streak = 0;
  state.answered = {};
  state.answeredCurrent = false;
}

/* ------------------------------------------------------------------
   RENDERING
   ------------------------------------------------------------------ */
const main = document.getElementById('main');
const topicSelect = document.getElementById('topic-select');
const statusFilter = document.getElementById('status-filter');
const progressFill = document.getElementById('progress-fill');
const statRight = document.getElementById('stat-right');
const statWrong = document.getElementById('stat-wrong');
const statStreak = document.getElementById('stat-streak');
const statQ = document.getElementById('stat-q');
const statTotal = document.getElementById('stat-total');

function renderTopicSelect() {
  topicSelect.innerHTML = '';
  const optAll = document.createElement('option');
  optAll.value = 'all';
  optAll.textContent = `All topics (${QUESTIONS.length})`;
  topicSelect.appendChild(optAll);
  TOPICS.forEach(t => {
    const count = QUESTIONS.filter(q => q.topic === t).length;
    const opt = document.createElement('option');
    opt.value = t;
    opt.textContent = `${t} (${count})`;
    topicSelect.appendChild(opt);
  });
  topicSelect.value = state.selectedTopic;
}

function renderStatusFilter() {
  // Counts within the currently selected topic
  const inTopic = QUESTIONS.map((q, i) => i).filter(i => matchesTopic(QUESTIONS[i]));
  const counts = { all: inTopic.length, unmarked: 0, review: 0, got: 0 };
  inTopic.forEach(i => {
    const s = state.statusMap[i];
    if (s === 'got') counts.got++;
    else if (s === 'review') counts.review++;
    else counts.unmarked++;
  });
  document.getElementById('count-all').textContent = counts.all;
  document.getElementById('count-unmarked').textContent = counts.unmarked;
  document.getElementById('count-review').textContent = counts.review;
  document.getElementById('count-got').textContent = counts.got;
  statusFilter.querySelectorAll('.seg-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === state.statusMode);
  });
}

function shuffleArr(a) {
  const out = a.slice();
  for (let i = out.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [out[i], out[j]] = [out[j], out[i]];
  }
  return out;
}

function renderCurrent() {
  if (state.order.length === 0) {
    main.innerHTML = `
      <div class="quiz-card">
        <div class="empty-state">
          <h2>No questions in the deck</h2>
          <p>Pick at least one topic above, or turn off "Missed only".</p>
        </div>
      </div>`;
    progressFill.style.width = '0%';
    return;
  }
  if (state.cursor >= state.order.length) {
    const total = state.right + state.wrong;
    const pct = total === 0 ? 0 : Math.round((state.right / total) * 100);
    const reviewCount = Object.values(state.statusMap).filter(s => s === 'review').length;
    main.innerHTML = `
      <div class="quiz-card">
        <div class="empty-state">
          <h2>Session complete</h2>
          <div class="big-score">${state.right}/${total}</div>
          <div class="pct">${pct}% &nbsp;·&nbsp; best streak: ${state.bestStreak}</div>
          <p style="margin-top:18px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap">
            <button class="btn primary" onclick="restartSession()">Restart session</button>
            <button class="btn" onclick="studyReview()">Study Review pile (${reviewCount})</button>
          </p>
        </div>
      </div>`;
    progressFill.style.width = '100%';
    return;
  }

  const qIdx = state.order[state.cursor];
  const q = QUESTIONS[qIdx];

  // Stable per-question option shuffle
  if (!q._shuffledOptions) {
    q._shuffledOptions = shuffleArr([q.correct, ...q.distractors]);
  }
  const options = q._shuffledOptions;
  const letters = ['A','B','C','D'];

  const prior = state.answered[qIdx];
  state.answeredCurrent = !!prior;
  const currentMark = state.statusMap[qIdx]; // 'got' | 'review' | undefined

  const markPill = currentMark === 'got'
    ? `<span class="mark-pill got">✓ Got it</span>`
    : currentMark === 'review'
      ? `<span class="mark-pill review">⟲ Needs review</span>`
      : '';

  main.innerHTML = `
    <div class="quiz-card">
      <div class="quiz-header">
        <span class="term-tag">${escapeHTML(q.term)}</span>
        <span style="display:inline-flex; align-items:center; gap:10px; flex-wrap:wrap">
          ${markPill}
          <span class="topic-tag">${escapeHTML(q.topic)}</span>
        </span>
      </div>
      <div class="question">${escapeHTML(q.q)}</div>
      <div class="options" id="options">
        ${options.map((opt, i) => `
          <button class="option" data-i="${i}">
            <span class="letter">${letters[i]}</span>
            <span class="text">${escapeHTML(opt)}</span>
          </button>`).join('')}
      </div>
      <div class="feedback" id="feedback">
        <div class="verdict" id="verdict"></div>
        <div class="excerpt-label">From the deck</div>
        <div class="excerpt" id="excerpt"></div>
      </div>
      <div class="mark-row" id="mark-row" style="display:none">
        <button class="mark-btn got ${currentMark === 'got' ? 'is-set' : ''}" id="btn-got">✓ Got it</button>
        <button class="mark-btn review ${currentMark === 'review' ? 'is-set' : ''}" id="btn-review">⟲ Needs review</button>
      </div>
      <div class="actions">
        <button class="btn ghost" id="btn-prev" ${state.cursor === 0 ? 'disabled' : ''}>← Prev</button>
        <button class="btn primary" id="btn-next">Next →</button>
      </div>
    </div>`;

  const optionEls = main.querySelectorAll('.option');
  optionEls.forEach(el => {
    el.onclick = () => answer(qIdx, parseInt(el.dataset.i, 10), options);
  });
  document.getElementById('btn-prev').onclick = prev;
  document.getElementById('btn-next').onclick = next;
  document.getElementById('btn-got').onclick = () => markStatus(qIdx, 'got');
  document.getElementById('btn-review').onclick = () => markStatus(qIdx, 'review');

  if (prior) revealAnswer(qIdx, options, prior.choice);
  updateStats();
}

function markStatus(qIdx, status) {
  const current = state.statusMap[qIdx];
  // Toggle off if clicking same mark
  if (current === status) {
    delete state.statusMap[qIdx];
  } else {
    state.statusMap[qIdx] = status;
  }
  persist();
  renderStatusFilter();
  // Update pill + buttons in-place without re-rendering question
  const pillHost = main.querySelector('.quiz-header > span:last-child');
  const existingPill = pillHost.querySelector('.mark-pill');
  if (existingPill) existingPill.remove();
  const newMark = state.statusMap[qIdx];
  if (newMark) {
    const pill = document.createElement('span');
    pill.className = 'mark-pill ' + newMark;
    pill.textContent = newMark === 'got' ? '✓ Got it' : '⟲ Needs review';
    pillHost.insertBefore(pill, pillHost.firstChild);
  }
  const btnGot = document.getElementById('btn-got');
  const btnReview = document.getElementById('btn-review');
  if (btnGot) btnGot.classList.toggle('is-set', newMark === 'got');
  if (btnReview) btnReview.classList.toggle('is-set', newMark === 'review');
}

function answer(qIdx, chosenI, options) {
  if (state.answered[qIdx]) return;
  const q = QUESTIONS[qIdx];
  const isRight = options[chosenI] === q.correct;
  state.answered[qIdx] = { choice: chosenI, correct: isRight };
  state.answeredCurrent = true;
  if (isRight) {
    state.right++;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
  } else {
    state.wrong++;
    state.streak = 0;
  }
  persist();
  revealAnswer(qIdx, options, chosenI);
  updateStats();
}

function revealAnswer(qIdx, options, chosenI) {
  const q = QUESTIONS[qIdx];
  const optionEls = main.querySelectorAll('.option');
  optionEls.forEach((el, i) => {
    el.disabled = true;
    const isCorrect = options[i] === q.correct;
    const isChosen = i === chosenI;
    if (isCorrect) el.classList.add('is-correct');
    else if (isChosen) el.classList.add('is-wrong');
    else el.classList.add('dim');
  });
  const fb = document.getElementById('feedback');
  const verdict = document.getElementById('verdict');
  const excerpt = document.getElementById('excerpt');
  const isRight = options[chosenI] === q.correct;
  fb.classList.add('show');
  fb.classList.toggle('right', isRight);
  fb.classList.toggle('wrong', !isRight);
  verdict.textContent = isRight ? 'Correct' : 'Not quite';
  excerpt.textContent = '"' + q.excerpt + '"';
  const markRow = document.getElementById('mark-row');
  if (markRow) markRow.style.display = 'flex';
}

function next() {
  state.cursor++;
  renderCurrent();
  scrollToTop();
}
function prev() {
  if (state.cursor === 0) return;
  state.cursor--;
  renderCurrent();
  scrollToTop();
}
function scrollToTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateStats() {
  statRight.textContent = state.right;
  statWrong.textContent = state.wrong;
  statStreak.textContent = state.streak;
  statQ.textContent = Math.min(state.cursor + 1, state.order.length);
  statTotal.textContent = state.order.length;
  const pct = state.order.length === 0
    ? 0
    : Math.min(100, ((state.cursor + (state.answeredCurrent ? 1 : 0)) / state.order.length) * 100);
  progressFill.style.width = pct + '%';
}

function restartSession() {
  // Re-shuffle option orders for fresh experience
  QUESTIONS.forEach(q => { delete q._shuffledOptions; });
  buildDeck();
  renderStatusFilter();
  renderCurrent();
}
function studyReview() {
  state.statusMode = 'review';
  persist();
  QUESTIONS.forEach(q => { delete q._shuffledOptions; });
  buildDeck();
  renderStatusFilter();
  renderCurrent();
}
window.restartSession = restartSession;
window.studyReview = studyReview;

/* ------------------------------------------------------------------
   TOOLBAR & KEYBOARD
   ------------------------------------------------------------------ */
topicSelect.onchange = () => {
  state.selectedTopic = topicSelect.value;
  persist();
  QUESTIONS.forEach(q => { delete q._shuffledOptions; });
  buildDeck();
  renderStatusFilter();
  renderCurrent();
};
statusFilter.querySelectorAll('.seg-btn').forEach(b => {
  b.onclick = () => {
    state.statusMode = b.dataset.mode;
    persist();
    QUESTIONS.forEach(q => { delete q._shuffledOptions; });
    buildDeck();
    renderStatusFilter();
    renderCurrent();
  };
});
document.getElementById('btn-shuffle').onclick = () => {
  QUESTIONS.forEach(q => { delete q._shuffledOptions; });
  buildDeck(); renderCurrent();
};
document.getElementById('btn-clear-marks').onclick = () => {
  const inTopic = QUESTIONS.map((q, i) => i).filter(i => matchesTopic(QUESTIONS[i]));
  const marked = inTopic.filter(i => state.statusMap[i]).length;
  if (marked === 0) return;
  const label = state.selectedTopic === 'all' ? 'all topics' : state.selectedTopic;
  if (!confirm(`Clear all Got It / Needs Review marks in ${label}? (${marked} marked)`)) return;
  inTopic.forEach(i => { delete state.statusMap[i]; });
  persist();
  buildDeck();
  renderStatusFilter();
  renderCurrent();
};
document.getElementById('btn-restart').onclick = () => restartSession();

document.addEventListener('keydown', (e) => {
  if (e.target.matches('input, textarea, select')) return;
  const key = e.key.toLowerCase();
  if (['1','2','3','4'].includes(key)) {
    const idx = parseInt(key, 10) - 1;
    const btn = main.querySelector(`.option[data-i="${idx}"]`);
    if (btn && !btn.disabled) btn.click();
    e.preventDefault();
  } else if (key === 'enter' || key === ' ') {
    if (state.answeredCurrent) {
      next();
      e.preventDefault();
    }
  } else if (key === 'g') {
    const qIdx = state.order[state.cursor];
    if (qIdx !== undefined) markStatus(qIdx, 'got');
  } else if (key === 'v') {
    const qIdx = state.order[state.cursor];
    if (qIdx !== undefined) markStatus(qIdx, 'review');
  } else if (key === 's') {
    QUESTIONS.forEach(q => { delete q._shuffledOptions; });
    buildDeck(); renderCurrent();
  } else if (key === 'r') {
    restartSession();
  } else if (key === 'arrowleft') {
    prev();
  } else if (key === 'arrowright' && state.answeredCurrent) {
    next();
  }
});

// Swipe (mobile): left = next (if answered), right = prev
let touchStartX = null;
main.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) touchStartX = e.touches[0].clientX;
}, { passive: true });
main.addEventListener('touchend', (e) => {
  if (touchStartX === null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 60) {
    if (dx < 0 && state.answeredCurrent) next();
    else if (dx > 0) prev();
  }
  touchStartX = null;
}, { passive: true });

/* ------------------------------------------------------------------
   UTILITIES
   ------------------------------------------------------------------ */
function escapeHTML(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

/* ------------------------------------------------------------------
   BOOT
   ------------------------------------------------------------------ */
loadPersisted();
renderTopicSelect();
renderStatusFilter();
buildDeck();
renderCurrent();
</script>
